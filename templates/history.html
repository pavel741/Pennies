<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pennies — History</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #232734;
    --border: #2e3348; --text: #e4e6f0; --text2: #9ca0b4;
    --accent: #6c5ce7; --accent2: #a29bfe; --green: #00cec9;
    --green-bg: rgba(0,206,201,.12);
    --red: #ff6b6b; --red-bg: rgba(255,107,107,.12);
    --yellow: #ffc048; --yellow-bg: rgba(255,192,72,.12);
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .nav-brand { font-size: 1.15rem; font-weight: 800; background: linear-gradient(135deg, var(--accent2), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-decoration: none; }
  .nav-links { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
  .nav-links a { color: var(--text2); text-decoration: none; font-size: .88rem; font-weight: 500; }
  .nav-links a:hover { color: var(--accent2); }
  .nav-links a.active { color: var(--accent2); }
  .nav-logout { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); }
  .nav-logout:hover { border-color: var(--accent); background: var(--surface2); }

  .hero { text-align: center; padding: 48px 20px 24px; }
  .hero h1 { font-size: 2.2rem; font-weight: 800; background: linear-gradient(135deg, var(--accent2), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .hero p { color: var(--text2); margin-top: 8px; font-size: .95rem; max-width: 500px; margin-left: auto; margin-right: auto; }

  .status { text-align: center; color: var(--text2); font-size: .9rem; min-height: 24px; margin-bottom: 16px; }
  .history-list { max-width: 900px; margin: 0 auto; padding: 0 20px 10px; display: flex; flex-direction: column; gap: 14px; }

  /* History card */
  .h-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color .2s; }
  .h-card:hover { border-color: var(--accent); }
  .h-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; cursor: pointer; }
  .h-header-left { display: flex; align-items: center; gap: 12px; }
  .h-date { font-size: .82rem; color: var(--text2); }
  .h-badge { font-size: .76rem; padding: 3px 10px; border-radius: 12px; background: var(--surface2); color: var(--text2); text-transform: capitalize; }
  .h-top-info { display: flex; align-items: center; gap: 8px; }
  .h-top-ticker { font-weight: 700; background: var(--surface2); padding: 4px 10px; border-radius: 6px; font-size: .92rem; }
  .h-score { font-weight: 700; font-size: .92rem; }
  .h-score.high { color: var(--green); }
  .h-score.mid { color: var(--yellow); }
  .h-score.low { color: var(--red); }
  .h-expand-hint { font-size: .78rem; color: var(--text2); }
  .h-delete-btn { padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border); background: none; color: var(--red); font-size: .78rem; cursor: pointer; transition: all .15s; }
  .h-delete-btn:hover { background: var(--red-bg); border-color: var(--red); }

  /* Expanded stocks */
  .h-body { max-height: 0; overflow: hidden; transition: max-height .35s ease; }
  .h-body.open { max-height: 3000px; }

  .h-actions-bar { display: flex; align-items: center; gap: 12px; padding: 10px 20px; background: var(--surface2); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .h-select-all { display: flex; align-items: center; gap: 6px; font-size: .82rem; color: var(--text2); cursor: pointer; }
  .h-select-all input { accent-color: var(--accent); }
  .h-track-btn { margin-left: auto; padding: 8px 20px; border-radius: 8px; border: none; background: linear-gradient(135deg, var(--accent), #7f6cf0); color: #fff; font-weight: 600; font-size: .85rem; cursor: pointer; box-shadow: 0 3px 12px rgba(108,92,231,.3); transition: transform .15s; }
  .h-track-btn:hover { transform: translateY(-1px); }
  .h-track-btn:disabled { opacity: .5; cursor: wait; transform: none; }
  .h-selected-count { font-size: .8rem; color: var(--text2); }

  .h-stock-list { }
  .h-stock { display: flex; align-items: center; gap: 12px; padding: 10px 20px; border-bottom: 1px solid var(--border); transition: background .1s; }
  .h-stock:last-child { border-bottom: none; }
  .h-stock:hover { background: rgba(108,92,231,.05); }
  .h-cb { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
  .h-s-ticker { font-weight: 700; min-width: 55px; }
  .h-s-score { font-weight: 600; min-width: 42px; }
  .h-s-rating { font-size: .82rem; color: var(--text2); min-width: 80px; }
  .h-s-price { font-size: .88rem; color: var(--accent2); font-weight: 500; margin-left: auto; }

  /* Performance results */
  .perf-panel { border-top: 1px solid var(--border); display: none; }
  .perf-panel.show { display: block; }
  .perf-title { padding: 16px 20px 8px; font-size: 1.05rem; font-weight: 700; color: var(--accent2); }
  .perf-subtitle { padding: 0 20px 12px; font-size: .82rem; color: var(--text2); }

  .perf-grid { padding: 0 20px 16px; display: flex; flex-direction: column; gap: 10px; }
  .perf-row { background: var(--surface2); border-radius: 10px; padding: 14px 16px; }
  .perf-row-top { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 8px; }
  .perf-ticker { font-size: 1.05rem; font-weight: 800; min-width: 55px; }
  .perf-verdict { padding: 3px 12px; border-radius: 8px; font-size: .8rem; font-weight: 700; }
  .perf-verdict.win { background: var(--green-bg); color: var(--green); }
  .perf-verdict.loss { background: var(--red-bg); color: var(--red); }
  .perf-verdict.flat { background: var(--yellow-bg); color: var(--yellow); }

  .perf-prices { display: flex; align-items: center; gap: 8px; margin-left: auto; flex-wrap: wrap; }
  .perf-price-then { font-size: .85rem; color: var(--text2); }
  .perf-arrow { font-size: .85rem; color: var(--text2); }
  .perf-price-now { font-size: .95rem; font-weight: 700; }
  .perf-delta { font-size: .88rem; font-weight: 700; padding: 2px 10px; border-radius: 6px; }
  .perf-delta.up { background: var(--green-bg); color: var(--green); }
  .perf-delta.down { background: var(--red-bg); color: var(--red); }

  .perf-scores { display: flex; gap: 6px; flex-wrap: wrap; }
  .perf-score-item { flex: 1; min-width: 100px; padding: 8px 10px; background: var(--surface); border-radius: 8px; text-align: center; }
  .perf-score-label { font-size: .68rem; text-transform: uppercase; letter-spacing: .3px; color: var(--text2); margin-bottom: 4px; }
  .perf-score-vals { display: flex; align-items: center; justify-content: center; gap: 6px; }
  .perf-score-old { font-size: .82rem; color: var(--text2); text-decoration: line-through; }
  .perf-score-new { font-size: .95rem; font-weight: 700; }
  .perf-score-arrow { font-size: .7rem; }
  .perf-score-arrow.up { color: var(--green); }
  .perf-score-arrow.down { color: var(--red); }

  .perf-bar { width: 100%; height: 4px; background: var(--border); border-radius: 2px; margin-top: 4px; overflow: hidden; }
  .perf-bar-fill { height: 100%; border-radius: 2px; }

  /* Summary stats */
  .perf-summary { display: flex; gap: 10px; padding: 0 20px 16px; flex-wrap: wrap; }
  .perf-stat { flex: 1; min-width: 120px; padding: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; text-align: center; }
  .perf-stat .ps-label { font-size: .7rem; text-transform: uppercase; letter-spacing: .3px; color: var(--text2); margin-bottom: 3px; }
  .perf-stat .ps-val { font-size: 1.1rem; font-weight: 800; }

  .pagination { display: flex; justify-content: center; gap: 8px; padding: 16px 0 60px; }
  .pg-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); font-size: .88rem; cursor: pointer; }
  .pg-btn:hover { border-color: var(--accent); color: var(--accent2); }
  .pg-btn:disabled { opacity: .4; cursor: default; }
  .pg-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .empty { text-align: center; padding: 40px 20px; color: var(--text2); font-size: 1rem; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2.5px solid var(--border); border-top-color: var(--accent2); border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    .perf-row-top { flex-direction: column; align-items: flex-start; }
    .perf-prices { margin-left: 0; }
  }
</style>
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-brand">Pennies</a>
    <div class="nav-links">
      <a href="/">Suggestions</a>
      <a href="/dividends">Dividends</a>
      <a href="/watchlist">Watchlist</a>
      <a href="/portfolio">Portfolio</a>
      <a href="/history" class="active">History</a>
      <a href="/logout" class="nav-logout">Logout</a>
    </div>
  </nav>

  <div class="hero">
    <h1>History</h1>
    <p>Review past suggestions and track how they performed. Expand a run, select stocks, and see if Pennies got it right.</p>
  </div>

  <div class="status" id="status"></div>
  <div class="history-list" id="list"></div>
  <div class="pagination" id="pag"></div>

<script>
const statusEl = document.getElementById('status');
const listEl = document.getElementById('list');
const pagEl = document.getElementById('pag');

function sc(s) { return s >= 70 ? 'high' : s >= 45 ? 'mid' : 'low'; }
function barHex(pct) { return pct >= 70 ? '#00cec9' : pct >= 45 ? '#ffc048' : '#ff6b6b'; }

function toggleBody(id) {
  document.getElementById(id).classList.toggle('open');
}

async function deleteRun(id, btn) {
  if (!confirm('Delete this history entry?')) return;
  btn.disabled = true;
  await fetch('/api/history/delete', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) });
  btn.closest('.h-card').remove();
}

function toggleSelectAll(runIdx) {
  const sa = document.getElementById('sa-' + runIdx);
  const cbs = document.querySelectorAll('.cb-' + runIdx);
  cbs.forEach(cb => { cb.checked = sa.checked; });
  updateCount(runIdx);
}

function updateCount(runIdx) {
  const cbs = document.querySelectorAll('.cb-' + runIdx + ':checked');
  const countEl = document.getElementById('count-' + runIdx);
  const btn = document.getElementById('track-' + runIdx);
  countEl.textContent = cbs.length + ' selected';
  btn.disabled = cbs.length < 1;
}

async function trackPerformance(runIdx, runDate) {
  const cbs = document.querySelectorAll('.cb-' + runIdx + ':checked');
  if (!cbs.length) return;

  const tickers = [];
  const historyData = {};
  cbs.forEach(cb => {
    const t = cb.dataset.ticker;
    tickers.push(t);
    historyData[t] = {
      price: parseFloat(cb.dataset.price) || null,
      currency: cb.dataset.currency || 'USD',
      score: parseFloat(cb.dataset.score) || null,
      rating: cb.dataset.rating || null,
      fundamentals: parseFloat(cb.dataset.fund) || null,
      valuation: parseFloat(cb.dataset.valu) || null,
      dividends: parseFloat(cb.dataset.divd) || null,
      technicals: parseFloat(cb.dataset.tech) || null,
    };
  });

  const panel = document.getElementById('perf-' + runIdx);
  const btn = document.getElementById('track-' + runIdx);
  btn.disabled = true;
  btn.textContent = 'Analyzing...';
  panel.classList.add('show');
  panel.innerHTML = '<div style="padding:20px;text-align:center"><span class="spinner"></span> Fetching live data for ' + tickers.length + ' stock(s)...</div>';

  try {
    const resp = await fetch('/api/compare', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tickers, as_of: runDate }),
    });
    const data = await resp.json();
    if (!resp.ok) {
      panel.innerHTML = '<div style="padding:20px;color:var(--red)">' + (data.error || 'Failed.') + '</div>';
    } else {
      const apiPrices = data.historical_prices || {};
      Object.keys(apiPrices).forEach(t => {
        if (historyData[t] && !historyData[t].price) {
          historyData[t].price = apiPrices[t];
        }
        if (!historyData[t]) {
          historyData[t] = { price: apiPrices[t], currency: 'USD' };
        }
      });
      renderPerformance(panel, data.results, historyData, runDate);
    }
  } catch (err) {
    panel.innerHTML = '<div style="padding:20px;color:var(--red)">Network error.</div>';
  }
  btn.disabled = false;
  btn.textContent = 'Track Performance';
}

function renderPerformance(panel, results, historyData, runDate) {
  const valid = results.filter(r => !r.error);
  if (!valid.length) {
    panel.innerHTML = '<div style="padding:20px;color:var(--red)">No valid results.</div>';
    return;
  }

  let winners = 0, losers = 0, totalDeltaPct = 0, count = 0;

  let rowsHtml = '';
  valid.forEach(r => {
    const old = historyData[r.ticker] || {};
    const oldPrice = old.price;
    const newPrice = r.price;
    const hasPriceDelta = oldPrice && newPrice;
    let priceDelta = 0, priceDeltaPct = 0;
    if (hasPriceDelta) {
      priceDelta = newPrice - oldPrice;
      priceDeltaPct = (priceDelta / oldPrice) * 100;
      totalDeltaPct += priceDeltaPct;
      count++;
      if (priceDeltaPct > 1) winners++;
      else if (priceDeltaPct < -1) losers++;
    }

    const dCls = priceDelta >= 0 ? 'up' : 'down';
    const dSign = priceDelta >= 0 ? '+' : '';
    const verdict = !hasPriceDelta ? 'flat' : priceDeltaPct > 1 ? 'win' : priceDeltaPct < -1 ? 'loss' : 'flat';
    const verdictText = !hasPriceDelta ? 'N/A' : priceDeltaPct > 1 ? 'Winner' : priceDeltaPct < -1 ? 'Loss' : 'Flat';

    let pricesHtml = '';
    if (hasPriceDelta) {
      pricesHtml = '<div class="perf-prices">' +
        '<span class="perf-price-then">' + old.currency + ' ' + oldPrice.toFixed(2) + '</span>' +
        '<span class="perf-arrow">&rarr;</span>' +
        '<span class="perf-price-now">' + r.currency + ' ' + newPrice.toFixed(2) + '</span>' +
        '<span class="perf-delta ' + dCls + '">' + dSign + priceDeltaPct.toFixed(1) + '% (' + dSign + priceDelta.toFixed(2) + ')</span>' +
        '</div>';
    } else {
      pricesHtml = '<div class="perf-prices"><span class="perf-price-now">' + r.currency + ' ' + newPrice.toFixed(2) + '</span><span class="perf-price-then">(no historical price)</span></div>';
    }

    const sections = [
      { key: 'fundamentals', label: 'Fundamentals', oldKey: 'fundamentals' },
      { key: 'valuation', label: 'Valuation', oldKey: 'valuation' },
      { key: 'dividends', label: 'Dividends', oldKey: 'dividends' },
      { key: 'technicals', label: 'Technicals', oldKey: 'technicals' },
      { key: 'overall', label: 'Overall', oldKey: 'score' },
    ];

    let scoresHtml = '';
    sections.forEach(sec => {
      let newPct, oldPct;
      if (sec.key === 'overall') {
        newPct = r.overall_pct;
        oldPct = old.score;
      } else {
        newPct = r[sec.key] ? r[sec.key].pct : null;
        oldPct = old[sec.key];
      }

      const color = barHex(newPct || 0);
      let deltaHtml = '';
      if (oldPct != null && newPct != null) {
        const d = newPct - oldPct;
        const aCls = d >= 0 ? 'up' : 'down';
        const aSign = d >= 0 ? '+' : '';
        deltaHtml = '<span class="perf-score-old">' + oldPct.toFixed(0) + '%</span><span class="perf-score-arrow ' + aCls + '">' + aSign + d.toFixed(0) + '</span>';
      }

      scoresHtml += '<div class="perf-score-item">' +
        '<div class="perf-score-label">' + sec.label + '</div>' +
        '<div class="perf-score-vals">' + deltaHtml + '<span class="perf-score-new" style="color:' + color + '">' + (newPct != null ? newPct.toFixed(0) + '%' : '-') + '</span></div>' +
        '<div class="perf-bar"><div class="perf-bar-fill" style="width:' + (newPct || 0) + '%;background:' + color + '"></div></div>' +
        '</div>';
    });

    rowsHtml += '<div class="perf-row">' +
      '<div class="perf-row-top">' +
      '<span class="perf-ticker">' + r.ticker + '</span>' +
      '<span class="perf-verdict ' + verdict + '">' + verdictText + '</span>' +
      pricesHtml +
      '</div>' +
      '<div class="perf-scores">' + scoresHtml + '</div>' +
      '</div>';
  });

  const avgDelta = count > 0 ? totalDeltaPct / count : 0;
  const avgCls = avgDelta >= 0 ? 'up' : 'down';
  const avgSign = avgDelta >= 0 ? '+' : '';

  let summaryHtml = '<div class="perf-summary">' +
    '<div class="perf-stat"><div class="ps-label">Stocks Tracked</div><div class="ps-val">' + valid.length + '</div></div>' +
    '<div class="perf-stat"><div class="ps-label">Winners</div><div class="ps-val up">' + winners + '</div></div>' +
    '<div class="perf-stat"><div class="ps-label">Losers</div><div class="ps-val down">' + losers + '</div></div>' +
    '<div class="perf-stat"><div class="ps-label">Avg. Price Change</div><div class="ps-val ' + avgCls + '">' + avgSign + avgDelta.toFixed(1) + '%</div></div>' +
    '</div>';

  panel.innerHTML =
    '<div class="perf-title">Performance Since ' + (runDate || 'suggestion') + '</div>' +
    '<div class="perf-subtitle">Live prices & scores vs. what they were when suggested</div>' +
    summaryHtml +
    '<div class="perf-grid">' + rowsHtml + '</div>';
}

async function load(page) {
  statusEl.innerHTML = '<span class="spinner"></span>Loading...';
  try {
    const resp = await fetch('/api/history?page=' + page);
    const data = await resp.json();
    statusEl.textContent = '';
    if (!data.items.length && page === 1) {
      listEl.innerHTML = '<div class="empty">No history yet. Run a suggestion or analysis to get started.</div>';
      pagEl.innerHTML = '';
      return;
    }
    listEl.innerHTML = '';
    data.items.forEach((item, idx) => {
      const card = document.createElement('div');
      card.className = 'h-card';
      const bodyId = 'body-' + idx;
      const perfId = 'perf-' + idx;

      let stockRows = '';
      if (item.summary && item.summary.length) {
        item.summary.forEach(s => {
          const sv = s.score != null ? s.score.toFixed(0) + '%' : '-';
          const priceStr = s.price ? (s.currency || 'USD') + ' ' + s.price.toFixed(2) : '';
          stockRows += '<div class="h-stock">' +
            '<input type="checkbox" class="h-cb cb-' + idx + '" data-ticker="' + s.ticker + '"' +
            ' data-price="' + (s.price || '') + '"' +
            ' data-currency="' + (s.currency || 'USD') + '"' +
            ' data-score="' + (s.score || '') + '"' +
            ' data-rating="' + (s.rating || '') + '"' +
            ' data-fund="' + (s.fundamentals_pct || '') + '"' +
            ' data-valu="' + (s.valuation_pct || '') + '"' +
            ' data-divd="' + (s.dividends_pct || '') + '"' +
            ' data-tech="' + (s.technicals_pct || '') + '"' +
            ' onchange="updateCount(' + idx + ')">' +
            '<span class="h-s-ticker">' + s.ticker + '</span>' +
            '<span class="h-s-score ' + (s.score ? sc(s.score) : '') + '">' + sv + '</span>' +
            '<span class="h-s-rating">' + (s.rating || '-') + '</span>' +
            '<span class="h-s-price">' + priceStr + '</span>' +
            '</div>';
        });
      }

      card.innerHTML =
        '<div class="h-header" onclick="toggleBody(\'' + bodyId + '\')">' +
          '<div>' +
            '<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px"><span class="h-date">' + (item.analyzed_at || '') + '</span><span class="h-badge">' + item.source + ' &middot; ' + (item.result_count || 0) + ' stocks</span></div>' +
            '<div class="h-top-info"><span class="h-top-ticker">' + (item.top_ticker || '-') + '</span><span class="h-score ' + sc(item.top_score || 0) + '">' + (item.top_score ? item.top_score.toFixed(0) + '%' : '-') + '</span><span style="color:var(--text2);font-size:.82rem">top score</span></div>' +
          '</div>' +
          '<div style="display:flex;align-items:center;gap:10px"><button class="h-delete-btn" onclick="event.stopPropagation();deleteRun(' + item.id + ',this)">Delete</button><span class="h-expand-hint">expand &darr;</span></div>' +
        '</div>' +
        '<div class="h-body" id="' + bodyId + '">' +
          '<div class="h-actions-bar">' +
            '<label class="h-select-all"><input type="checkbox" id="sa-' + idx + '" onchange="toggleSelectAll(' + idx + ')"> Select all</label>' +
            '<span class="h-selected-count" id="count-' + idx + '">0 selected</span>' +
            '<button class="h-track-btn" id="track-' + idx + '" disabled onclick="trackPerformance(' + idx + ',\'' + (item.analyzed_at || '') + '\')">Track Performance</button>' +
          '</div>' +
          '<div class="h-stock-list">' + stockRows + '</div>' +
          '<div class="perf-panel" id="' + perfId + '"></div>' +
        '</div>';

      listEl.appendChild(card);
    });

    pagEl.innerHTML = '';
    if (data.pages > 1) {
      const prev = document.createElement('button');
      prev.className = 'pg-btn'; prev.textContent = 'Prev'; prev.disabled = page <= 1;
      prev.onclick = () => load(page - 1);
      pagEl.appendChild(prev);
      for (let p = 1; p <= data.pages; p++) {
        const btn = document.createElement('button');
        btn.className = 'pg-btn' + (p === page ? ' active' : '');
        btn.textContent = p; btn.onclick = () => load(p);
        pagEl.appendChild(btn);
      }
      const next = document.createElement('button');
      next.className = 'pg-btn'; next.textContent = 'Next'; next.disabled = page >= data.pages;
      next.onclick = () => load(page + 1);
      pagEl.appendChild(next);
    }
  } catch (err) { statusEl.textContent = 'Failed to load history.'; }
}

load(1);
</script>
</body>
</html>
