<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pennies — Stock Suggestions</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232734;
    --border: #2e3348;
    --text: #e4e6f0;
    --text2: #9ca0b4;
    --accent: #6c5ce7;
    --accent2: #a29bfe;
    --green: #00cec9;
    --green-bg: rgba(0,206,201,.12);
    --yellow: #ffc048;
    --yellow-bg: rgba(255,192,72,.12);
    --red: #ff6b6b;
    --red-bg: rgba(255,107,107,.12);
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ---- Hero ---- */
  .hero {
    text-align: center;
    padding: 64px 20px 48px;
  }
  .hero h1 {
    font-size: 3rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent2), var(--green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero p {
    color: var(--text2);
    margin-top: 10px;
    font-size: 1.1rem;
    max-width: 540px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.6;
  }

  /* ---- Big CTA ---- */
  .cta-area {
    text-align: center;
    margin-bottom: 20px;
  }
  .cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 20px 48px;
    border-radius: 16px;
    border: none;
    background: linear-gradient(135deg, var(--accent), #7f6cf0);
    color: #fff;
    font-size: 1.25rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform .15s, box-shadow .2s;
    box-shadow: 0 4px 24px rgba(108,92,231,.35);
    letter-spacing: .3px;
  }
  .market-picker {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-bottom: 16px;
  }
  .market-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    font-size: .88rem;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
    user-select: none;
  }
  .market-chip:hover { border-color: var(--accent); color: var(--text); }
  .market-chip.selected { border-color: var(--accent); background: rgba(108,92,231,.15); color: var(--accent2); }
  .market-chip input { display: none; }

  .price-filter {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 16px;
    color: var(--text2);
    font-size: .95rem;
  }
  .price-filter input {
    width: 80px;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 1rem;
    font-weight: 600;
    text-align: center;
    outline: none;
    transition: border .2s;
  }
  .price-filter input:focus { border-color: var(--accent); }

  .gamble-btn {
    background: linear-gradient(135deg, #e17055, #d63031);
    box-shadow: 0 4px 24px rgba(214,48,49,.35);
  }
  .gamble-btn:hover { box-shadow: 0 8px 32px rgba(214,48,49,.5); }
  .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(108,92,231,.5); }
  .cta-btn:active { transform: scale(.97); }
  .cta-btn:disabled { opacity: .5; cursor: wait; transform: none; box-shadow: none; }
  .cta-btn svg { width: 26px; height: 26px; fill: currentColor; }

  /* ---- Optional lookup ---- */
  .lookup-toggle {
    text-align: center;
    margin-bottom: 32px;
  }
  .lookup-toggle button {
    background: none;
    border: none;
    color: var(--text2);
    font-size: .9rem;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .lookup-toggle button:hover { color: var(--accent2); }

  .lookup-area {
    max-width: 620px;
    margin: 0 auto 36px;
    padding: 0 20px;
    display: none;
    gap: 10px;
  }
  .lookup-area.open { display: flex; }
  .lookup-area input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: .95rem;
    outline: none;
    transition: border .2s;
  }
  .lookup-area input:focus { border-color: var(--accent); }
  .lookup-area input::placeholder { color: var(--text2); }
  .lookup-area button {
    padding: 12px 22px;
    border-radius: 10px;
    border: none;
    background: var(--surface2);
    color: var(--accent2);
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: background .2s;
    white-space: nowrap;
  }
  .lookup-area button:hover { background: var(--border); }
  .lookup-area button:disabled { opacity: .5; cursor: wait; }

  /* ---- Status ---- */
  .status {
    text-align: center;
    color: var(--text2);
    margin-bottom: 28px;
    min-height: 28px;
    font-size: .95rem;
    padding: 0 20px;
  }
  .status.error { color: var(--red); }

  /* ---- Progress bar ---- */
  .progress-wrap {
    max-width: 400px;
    margin: 0 auto 24px;
    padding: 0 20px;
    display: none;
  }
  .progress-wrap.show { display: block; }
  .progress-track {
    width: 100%;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 3px;
    transition: width .3s ease;
  }

  /* ---- Results ---- */
  .results {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px 60px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .rank-badge {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: .95rem;
    flex-shrink: 0;
  }
  .rank-1 { background: linear-gradient(135deg, #f9ca24, #f0932b); color: #1a1d27; }
  .rank-2 { background: linear-gradient(135deg, #b2bec3, #636e72); color: #fff; }
  .rank-3 { background: linear-gradient(135deg, #e17055, #d63031); color: #fff; }
  .rank-n { background: var(--surface2); color: var(--text2); }

  /* ---- Stock Card ---- */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color .2s;
  }
  .card:hover { border-color: var(--accent); }

  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 22px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .card-left { display: flex; align-items: center; gap: 14px; }
  .ticker-badge {
    font-size: 1.2rem;
    font-weight: 700;
    background: var(--surface2);
    padding: 7px 13px;
    border-radius: 8px;
    letter-spacing: .5px;
  }
  .stock-meta { color: var(--text2); font-size: .88rem; }

  .card-right { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
  .price { font-size: .95rem; font-weight: 600; color: var(--accent2); margin-left: 6px; }

  .overall-score {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 14px;
    border-radius: 8px;
    font-weight: 700;
    font-size: 1rem;
  }
  .overall-score.strong-buy { background: var(--green-bg); color: var(--green); }
  .overall-score.buy         { background: var(--green-bg); color: #55efc4; }
  .overall-score.hold        { background: var(--yellow-bg); color: var(--yellow); }
  .overall-score.underperform{ background: var(--red-bg); color: #fab1a0; }
  .overall-score.sell         { background: var(--red-bg); color: var(--red); }

  .ring-container { width: 48px; height: 48px; position: relative; }
  .ring-container svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--surface2); stroke-width: 5; }
  .ring-fg { fill: none; stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset .8s ease; }
  .ring-label {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: .72rem; font-weight: 700;
  }

  .card-toggle {
    width: 100%;
    padding: 0;
    border: none;
    background: none;
    cursor: pointer;
  }

  /* ---- Breakdown grid (collapsible) ---- */
  .breakdown-wrap {
    max-height: 0;
    overflow: hidden;
    transition: max-height .35s ease;
  }
  .breakdown-wrap.open { max-height: 900px; }

  .breakdown {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 1px;
    background: var(--border);
    border-top: 1px solid var(--border);
  }
  .section {
    background: var(--surface);
    padding: 16px 22px;
  }
  .section-title {
    font-size: .82rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .6px;
    color: var(--accent2);
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .section-pct {
    font-size: .78rem;
    color: var(--text2);
    font-weight: 500;
    text-transform: none;
    letter-spacing: 0;
  }

  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
    font-size: .85rem;
  }
  .detail-label { color: var(--text2); }
  .detail-value { font-weight: 500; }
  .detail-pts {
    font-size: .75rem;
    color: var(--text2);
    margin-left: 6px;
  }

  .bar-track {
    width: 100%;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    margin-top: 10px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width .6s ease;
  }

  .expand-hint {
    text-align: center;
    padding: 8px;
    font-size: .78rem;
    color: var(--text2);
    border-top: 1px solid var(--border);
    transition: color .2s;
  }
  .card:hover .expand-hint { color: var(--accent2); }

  .card-error {
    padding: 18px 22px;
    color: var(--red);
    font-size: .88rem;
  }

  .spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2.5px solid var(--border);
    border-top-color: var(--accent2);
    border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- Prediction banner ---- */
  .prediction-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 22px;
    background: var(--surface2);
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .pred-label {
    font-size: .78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--accent2);
    white-space: nowrap;
  }
  .pred-items {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    flex: 1;
  }
  .pred-item {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .pred-item-label {
    font-size: .7rem;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: .3px;
  }
  .pred-item-value {
    font-size: .95rem;
    font-weight: 600;
  }
  .pred-up { color: var(--green); }
  .pred-down { color: var(--red); }
  .pred-neutral { color: var(--yellow); }
  .pred-range {
    font-size: .78rem;
    color: var(--text2);
    font-weight: 400;
  }

  .export-bar {
    max-width: 1100px;
    margin: 0 auto 16px;
    padding: 0 20px;
    display: none;
    justify-content: flex-end;
  }
  .export-bar.show { display: flex; gap: 10px; }
  .cache-info {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: .85rem;
    color: var(--text2);
  }
  .refresh-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 18px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--yellow);
    font-size: .85rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s, border-color .2s;
  }
  .refresh-btn:hover { background: var(--surface2); border-color: var(--yellow); }
  .refresh-btn svg { width: 16px; height: 16px; fill: currentColor; }
  .export-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 22px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--accent2);
    font-size: .9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s, border-color .2s;
  }
  .export-btn:hover { background: var(--surface2); border-color: var(--accent); }
  .export-btn svg { width: 18px; height: 18px; fill: currentColor; }

  /* ---- Nav bar ---- */
  .nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .nav-brand { font-size: 1.15rem; font-weight: 800; background: linear-gradient(135deg, var(--accent2), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-decoration: none; }
  .nav-links { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
  .nav-links a { color: var(--text2); text-decoration: none; font-size: .88rem; font-weight: 500; }
  .nav-links a:hover { color: var(--accent2); }
  .nav-links a.active { color: var(--accent2); }
  .nav-logout { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); }
  .nav-logout:hover { border-color: var(--accent); background: var(--surface2); }

  /* ---- Card action buttons ---- */
  .card-actions { display: flex; gap: 8px; padding: 10px 22px; border-top: 1px solid var(--border); }
  .card-action-btn { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); font-size: .82rem; font-weight: 500; cursor: pointer; transition: all .2s; }
  .card-action-btn:hover { border-color: var(--accent); color: var(--accent2); }
  .card-action-btn.added { border-color: var(--green); color: var(--green); cursor: default; }

  /* ---- Strategy selector ---- */
  .strategy-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 16px;
    color: var(--text2);
    font-size: .95rem;
  }
  .strategy-row select {
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: .9rem;
    outline: none;
    transition: border .2s;
  }
  .strategy-row select:focus { border-color: var(--accent); }

  /* ---- Advanced filters ---- */
  .adv-filter-toggle {
    text-align: center;
    margin-bottom: 12px;
  }
  .adv-filter-toggle button {
    background: none;
    border: none;
    color: var(--text2);
    font-size: .85rem;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .adv-filter-toggle button:hover { color: var(--accent2); }

  .adv-filters {
    display: none;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    margin-bottom: 18px;
    padding: 14px 20px;
    max-width: 700px;
    margin-left: auto;
    margin-right: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .adv-filters.open { display: flex; }
  .filter-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .filter-group label {
    font-size: .75rem;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: .4px;
  }
  .filter-group select {
    padding: 7px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: .85rem;
    outline: none;
  }
  .filter-group select:focus { border-color: var(--accent); }

  /* ---- Scout / Tech signals ---- */
  .scout-signals, .tech-setups {
    max-width: 700px;
    margin: 0 auto 16px;
    padding: 14px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .signal-title {
    font-size: .82rem;
    font-weight: 600;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: .4px;
    margin-bottom: 10px;
  }
  .signal-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  /* ---- Scout/Tech buttons ---- */
  .scout-btn {
    background: linear-gradient(135deg, #00b894, #00cec9);
    box-shadow: 0 4px 24px rgba(0,206,201,.35);
  }
  .scout-btn:hover { box-shadow: 0 8px 32px rgba(0,206,201,.5); }
  .tech-btn {
    background: linear-gradient(135deg, #fdcb6e, #e17055);
    box-shadow: 0 4px 24px rgba(225,112,85,.35);
  }
  .tech-btn:hover { box-shadow: 0 8px 32px rgba(225,112,85,.5); }
  .reddit-btn {
    background: linear-gradient(135deg, #ff6b35, #ff4500);
    box-shadow: 0 4px 24px rgba(255,69,0,.35);
  }
  .reddit-btn:hover { box-shadow: 0 8px 32px rgba(255,69,0,.5); }
  .growth-btn {
    background: linear-gradient(135deg, #0984e3, #6c5ce7);
    box-shadow: 0 4px 24px rgba(9,132,227,.35);
  }
  .growth-btn:hover { box-shadow: 0 8px 32px rgba(9,132,227,.5); }
  .reddit-badge {
    display: inline-block;
    background: rgba(255,69,0,.15);
    color: #ff4500;
    font-size: .72rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    margin-right: 6px;
    margin-top: 4px;
  }

  /* ---- Chart section (main page) ---- */
  .main-chart-section {
    border-top: 1px solid var(--border);
    background: #0a0c12;
  }
  .mchart-toolbar {
    display: flex; align-items: center; gap: 4px; padding: 8px 16px;
    background: var(--surface2); border-bottom: 1px solid var(--border); flex-wrap: wrap;
  }
  .mchart-tf {
    padding: 3px 9px; border-radius: 5px; border: 1px solid transparent;
    background: transparent; color: var(--text2); font-size: .7rem; font-weight: 600;
    cursor: pointer; transition: all .15s; text-transform: uppercase; letter-spacing: .3px;
  }
  .mchart-tf:hover { color: var(--text); background: var(--surface); }
  .mchart-tf.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .mchart-type-btn {
    margin-left: auto; padding: 3px 9px; border-radius: 5px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text2); font-size: .7rem; font-weight: 600;
    cursor: pointer; transition: all .15s;
  }
  .mchart-type-btn:hover { border-color: var(--accent); color: var(--accent2); }
  .mchart-container { height: 280px; padding: 0 4px 4px; }
  .mchart-loading { display: flex; align-items: center; justify-content: center; height: 280px; color: var(--text2); font-size: .85rem; }

  /* ---- News section ---- */
  .news-section {
    padding: 12px 22px;
    border-top: 1px solid var(--border);
  }
  .news-item {
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .news-item:last-child { border-bottom: none; }
  .news-headline {
    font-size: .88rem;
    font-weight: 500;
    color: var(--text);
    text-decoration: none;
    transition: color .2s;
  }
  .news-headline:hover { color: var(--accent2); }
  .news-meta {
    font-size: .75rem;
    color: var(--text2);
    margin-top: 3px;
  }
  .news-empty {
    font-size: .85rem;
    color: var(--text2);
    font-style: italic;
  }

  /* ---- Signal badges on cards ---- */
  .signal-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 8px 22px;
    border-top: 1px solid var(--border);
  }
  .signal-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: .75rem;
    font-weight: 600;
    background: rgba(0,206,201,.12);
    color: var(--green);
    border: 1px solid rgba(0,206,201,.25);
  }
  .signal-badge.earnings { background: rgba(108,92,231,.12); color: var(--accent2); border-color: rgba(108,92,231,.25); }
  .signal-badge.insider { background: rgba(255,192,72,.12); color: var(--yellow); border-color: rgba(255,192,72,.25); }
  .signal-badge.upgrade { background: rgba(0,206,201,.12); color: var(--green); border-color: rgba(0,206,201,.25); }

<script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
<script>
const suggestBtn = document.getElementById('suggestBtn');
const lookupBtn  = document.getElementById('lookupBtn');
const mainCharts = {};
const statusEl   = document.getElementById('status');
const resultsEl  = document.getElementById('results');
const progressWrap = document.getElementById('progressWrap');
const progressBar  = document.getElementById('progressBar');
const exportBar    = document.getElementById('exportBar');
const cacheInfo    = document.getElementById('cacheInfo');
const refreshBtn   = document.getElementById('refreshBtn');
let lastResults = [];
let lastMode = null;

document.querySelectorAll('.market-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const cb = chip.querySelector('input');
    cb.checked = !cb.checked;
    chip.classList.toggle('selected', cb.checked);
  });
});

function getSelectedMarkets() {
  return Array.from(document.querySelectorAll('#marketPicker .market-chip input:checked')).map(cb => cb.value);
}

function getSelectedSignals() {
  return Array.from(document.querySelectorAll('#scoutSignals .market-chip input:checked')).map(cb => cb.value);
}

function getSelectedSetups() {
  return Array.from(document.querySelectorAll('#techSetups .market-chip input:checked')).map(cb => cb.value);
}

function getAdvFilters() {
  const filters = {};
  const sector = document.getElementById('filterSector').value;
  if (sector) filters.sectors = [sector];
  const minCap = document.getElementById('filterMinCap').value;
  if (minCap) filters.min_market_cap = parseFloat(minCap);
  const minYield = document.getElementById('filterMinYield').value;
  if (minYield) filters.min_dividend_yield = parseFloat(minYield);
  const maxPE = document.getElementById('filterMaxPE').value;
  if (maxPE) filters.max_pe = parseFloat(maxPE);
  return Object.keys(filters).length > 0 ? filters : null;
}

function toggleAdvFilters() {
  document.getElementById('advFilters').classList.toggle('open');
}

function toggleLookup() {
  document.getElementById('lookupArea').classList.toggle('open');
}

// Show/hide scout and tech panels based on which mode was last activated
function showModePanel(mode) {
  document.getElementById('scoutSignals').style.display = mode === 'scout' ? 'block' : 'none';
  document.getElementById('techSetups').style.display = mode === 'tech' ? 'block' : 'none';
  document.getElementById('strategyRow').style.display = (mode === 'suggest' || mode === '') ? 'flex' : 'none';
}

function formatAge(minutes) {
  if (minutes < 1) return 'just now';
  if (minutes < 60) return minutes + 'min ago';
  const h = Math.floor(minutes / 60);
  const m = minutes % 60;
  return h + 'h ' + (m > 0 ? m + 'min' : '') + ' ago';
}

function showCacheInfo(ageMin) {
  cacheInfo.textContent = 'Cached ' + formatAge(ageMin);
  refreshBtn.style.display = '';
}

function hideCacheInfo() {
  cacheInfo.textContent = '';
  refreshBtn.style.display = 'none';
}

function forceRefresh() {
  if (!lastMode) return;
  if (lastMode === 'suggest') runSuggest(true);
  else if (lastMode === 'gamble') runGamble(true);
  else if (lastMode === 'scout') runScout(true);
  else if (lastMode === 'tech') runTechScan();
  else if (lastMode === 'reddit') runReddit();
}

function showProgress(pct) {
  progressWrap.classList.add('show');
  progressBar.style.width = (pct || 0) + '%';
}

function updateProgress(pct) {
  progressBar.style.width = Math.min(pct, 100) + '%';
}

function hideProgress() {
  progressBar.style.width = '100%';
  setTimeout(() => { progressWrap.classList.remove('show'); progressBar.style.width = '0%'; }, 400);
}

async function pollJob(jobId) {
  while (true) {
    await new Promise(r => setTimeout(r, 2000));
    try {
      const resp = await fetch('/api/job/' + jobId);
      const data = await resp.json();
      if (data.status === 'running') {
        updateProgress(data.progress);
        statusEl.innerHTML = '<span class="spinner"></span>' + (data.message || 'Working...');
      } else if (data.status === 'done') {
        return data;
      } else if (data.status === 'failed') {
        throw new Error(data.error || 'Analysis failed');
      }
    } catch (err) {
      if (err.message && err.message !== 'Analysis failed') {
        throw err;
      }
      throw err;
    }
  }
}

function disableAllButtons(disabled) {
  ['suggestBtn','gambleBtn','scoutBtn','techBtn','redditBtn','growthBtn'].forEach(id => {
    document.getElementById(id).disabled = disabled;
  });
}

async function runSuggest(force) {
  lastMode = 'suggest';
  showModePanel('suggest');
  disableAllButtons(true);
  resultsEl.innerHTML = '';
  statusEl.className = 'status';
  hideCacheInfo();
  showProgress(0);

  try {
    const maxPrice = parseFloat(document.getElementById('maxPrice').value) || null;
    const markets = getSelectedMarkets();
    const strategy = document.getElementById('strategySelect').value || null;
    const filters = getAdvFilters();
    if (markets.length === 0) {
      statusEl.className = 'status error';
      statusEl.textContent = 'Select at least one market.';
      hideProgress();
      disableAllButtons(false);
      return;
    }
    const mktLabel = markets.map(m => m.toUpperCase()).join(', ');
    const stratLabel = strategy ? ' [' + strategy.charAt(0).toUpperCase() + strategy.slice(1) + ']' : '';
    statusEl.innerHTML = '<span class="spinner"></span>Starting analysis for ' + mktLabel + stratLabel + '...';

    const startResp = await fetch('/suggest', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ top: 30, max_price: maxPrice, markets, strategy, filters, force: !!force }),
    });
    const startData = await startResp.json();

    if (startData.cached) {
      hideProgress();
      const priceNote = maxPrice ? ` under $${maxPrice}` : '';
      const mktNote = markets.map(m => m.toUpperCase()).join(', ');
      statusEl.innerHTML = `Top <strong>${startData.results.length}</strong> suggestions${priceNote} from ${mktNote}${stratLabel} — click any card for details`;
      renderResults(startData.results);
      showCacheInfo(startData.cache_age_min);
    } else {
      if (!startResp.ok || !startData.job_id) {
        throw new Error(startData.error || 'Failed to start analysis');
      }
      const data = await pollJob(startData.job_id);
      hideProgress();
      const priceNote = maxPrice ? ` under $${maxPrice}` : '';
      const mktNote = markets.map(m => m.toUpperCase()).join(', ');
      statusEl.innerHTML = `Top <strong>${data.results.length}</strong> suggestions${priceNote} from ${mktNote}${stratLabel} — click any card for details`;
      renderResults(data.results);
    }
  } catch (err) {
    hideProgress();
    statusEl.className = 'status error';
    statusEl.textContent = err.message || 'Network error — is the server running?';
  }
  disableAllButtons(false);
}

async function runGrowthPicks() {
  document.getElementById('strategySelect').value = 'growth_potential';
  await runSuggest(false);
}

async function runGamble(force) {
  lastMode = 'gamble';
  showModePanel('gamble');
  disableAllButtons(true);
  resultsEl.innerHTML = '';

      const priceNote = maxPrice ? ` under $${maxPrice}` : '';

      renderResults(startData.results);
      showCacheInfo(startData.cache_age_min);
    } else {
      if (!startResp.ok || !startData.job_id) {
        throw new Error(startData.error || 'Failed to start analysis');
      }
      const data = await pollJob(startData.job_id);
      hideProgress();
      const priceNote = maxPrice ? ` under $${maxPrice}` : '';
      statusEl.innerHTML = `<strong>${data.results.length}</strong> high-upside gambles${priceNote} — sorted by predicted gains. Higher risk!`;
      renderResults(data.results);
    }
  } catch (err) {
    hideProgress();
    statusEl.className = 'status error';
    statusEl.textContent = err.message || 'Network error — is the server running?';
  }
  disableAllButtons(false);
}

async function runScout(force) {
  lastMode = 'scout';
  showModePanel('scout');
  disableAllButtons(true);
  resultsEl.innerHTML = '';
  statusEl.className = 'status';
  hideCacheInfo();

  try {

      renderResults(startData.results);
      showCacheInfo(startData.cache_age_min);
    } else {
      if (!startResp.ok || !startData.job_id) {

      const data = await pollJob(startData.job_id);

    }
  } catch (err) {

    statusEl.className = 'status error';
    statusEl.textContent = err.message || 'Network error — is the server running?';

  lastMode = 'tech';
  showModePanel('tech');
  disableAllButtons(true);
  resultsEl.innerHTML = '';

  showProgress(0);

  try {
    const maxPrice = parseFloat(document.getElementById('maxPrice').value) || null;
    const markets = getSelectedMarkets();
    const setups = getSelectedSetups();
    const filters = getAdvFilters();
    if (markets.length === 0) {
      statusEl.className = 'status error';
      statusEl.textContent = 'Select at least one market.';
      hideProgress();
      disableAllButtons(false);
      return;
    }
    if (setups.length === 0) {
      statusEl.className = 'status error';
      statusEl.textContent = 'Select at least one technical setup.';
      hideProgress();
      disableAllButtons(false);
      return;
    }
    statusEl.innerHTML = '<span class="spinner"></span>Scanning charts for technical setups...';

    const startResp = await fetch('/technical-scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ top: 30, max_price: maxPrice, markets, setups, filters }),
    });
    const startData = await startResp.json();

    if (!startResp.ok || !startData.job_id) {
      throw new Error(startData.error || 'Failed to start technical scan');
    }
    const data = await pollJob(startData.job_id);
    hideProgress();
    statusEl.innerHTML = `<strong>${data.results.length}</strong> stocks with technical setups — sorted by score`;
    renderResults(data.results);
  } catch (err) {
    hideProgress();
    statusEl.className = 'status error';
    statusEl.textContent = err.message || 'Network error — is the server running?';
  }
  disableAllButtons(false);
}

function ratingClass(r) { return r.toLowerCase().replace(/\s+/g, '-'); }

function barColor(pct) {
  if (pct >= 70) return 'var(--green)';
  if (pct >= 45) return 'var(--yellow)';
  return 'var(--red)';
}
function ringColor(pct) { return barColor(pct); }

function buildRing(pct) {
  const r = 20, circ = 2 * Math.PI * r;
  const offset = circ * (1 - pct / 100);
  const color = ringColor(pct);
  return `<div class="ring-container">
    <svg width="48" height="48" viewBox="0 0 48 48">
      <circle class="ring-bg" cx="24" cy="24" r="${r}"/>
      <circle class="ring-fg" cx="24" cy="24" r="${r}" stroke="${color}"
        stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
    </svg>
    <span class="ring-label" style="color:${color}">${Math.round(pct)}</span>
  </div>`;
}

function buildSection(title, section) {
  let rows = '';
  for (const d of section.details) {
    rows += `<div class="detail-row">
      <span class="detail-label">${d.label}</span>
      <span><span class="detail-value">${d.value}</span><span class="detail-pts">${d.pts}/${d.max}</span></span>
    </div>`;
  }
  const color = barColor(section.pct);
  return `<div class="section">
    <div class="section-title">${title}<span class="section-pct">${section.score}/${section.max}</span></div>
    ${rows}
    <div class="bar-track"><div class="bar-fill" style="width:${section.pct}%;background:${color}"></div></div>
  </div>`;
}

function buildPrediction(pred) {
  if (!pred || !pred.combined_estimate) return '';
  const upPct = pred.upside_pct;
  const cls = upPct > 2 ? 'pred-up' : upPct < -2 ? 'pred-down' : 'pred-neutral';
  const arrow = upPct > 2 ? '\u25B2' : upPct < -2 ? '\u25BC' : '\u25C6';
  const sign = upPct > 0 ? '+' : '';

  let items = `
    <div class="pred-item">
      <span class="pred-item-label">6M Estimate</span>
      <span class="pred-item-value ${cls}">${arrow} $${pred.combined_estimate.toFixed(2)} <span style="font-size:.82rem">(${sign}${upPct.toFixed(1)}%)</span></span>
    </div>`;

  if (pred.analyst_target) {
    items += `
    <div class="pred-item">
      <span class="pred-item-label">Analyst Target${pred.analyst_count ? ' (' + pred.analyst_count + ')' : ''}</span>
      <span class="pred-item-value" style="color:var(--text)">$${pred.analyst_target.toFixed(2)}${pred.analyst_low && pred.analyst_high ? ' <span class="pred-range">($' + pred.analyst_low.toFixed(2) + ' – $' + pred.analyst_high.toFixed(2) + ')</span>' : ''}</span>
    </div>`;
  }

  if (pred.trend_6m) {
    const tCls = pred.trend_direction === 'up' ? 'pred-up' : 'pred-down';
    items += `
    <div class="pred-item">
      <span class="pred-item-label">Trend Projection</span>
      <span class="pred-item-value ${tCls}">$${pred.trend_6m.toFixed(2)}</span>
    </div>`;
  }

  if (pred.dcf_value) {
    const dcfDiff = ((pred.dcf_value - pred.current) / pred.current * 100);
    const dcfCls = dcfDiff > 5 ? 'pred-up' : dcfDiff < -5 ? 'pred-down' : 'pred-neutral';
    const dcfSign = dcfDiff > 0 ? '+' : '';
    items += `
    <div class="pred-item">
      <span class="pred-item-label">DCF Fair Value</span>
      <span class="pred-item-value ${dcfCls}">$${pred.dcf_value.toFixed(2)} <span class="pred-range">(${dcfSign}${dcfDiff.toFixed(1)}%)</span></span>
    </div>`;
  }

  if (pred.earnings_momentum !== null && pred.earnings_momentum !== undefined) {
    const emCls = pred.earnings_momentum > 0 ? 'pred-up' : pred.earnings_momentum < 0 ? 'pred-down' : 'pred-neutral';
    const emSign = pred.earnings_momentum > 0 ? '+' : '';
    items += `
    <div class="pred-item">
      <span class="pred-item-label">Earnings Momentum</span>
      <span class="pred-item-value ${emCls}">${emSign}${pred.earnings_momentum.toFixed(1)}%</span>
    </div>`;
  }

  return `<div class="prediction-bar">
    <span class="pred-label">6M Outlook</span>
    <div class="pred-items">${items}</div>
  </div>`;
}

function buildRedditBadge(redditSignals) {
  if (!redditSignals || !redditSignals.mentions) return '';
  const subs = (redditSignals.subreddits || ['wallstreetbets']).map(s => 'r/' + s).join(', ');
  return `<span class="reddit-badge">Mentioned ${redditSignals.mentions}x on ${subs}</span>`;
}

function buildSignalBadges(signals) {
  if (!signals || !signals.length) return '';
  let badges = '';
  for (const sig of signals) {
    let cls = '';
    if (sig.signal.includes('earnings')) cls = 'earnings';
    else if (sig.signal.includes('insider')) cls = 'insider';
    else if (sig.signal.includes('analyst') || sig.signal.includes('upgrade')) cls = 'upgrade';
    else if (['golden_cross','rsi_oversold_bounce','breakout','pullback_to_support'].includes(sig.signal)) cls = 'technical';
    badges += `<span class="signal-badge ${cls}">${sig.description}</span>`;
  }
  return `<div class="signal-badges">${badges}</div>`;
}

function renderResults(results) {
  lastResults = results;
  exportBar.classList.toggle('show', results.length > 0);
  resultsEl.innerHTML = '';
  results.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    const id = 'bd-' + i;

    if (r.error) {
      card.innerHTML = `<div class="card-top"><div class="card-left"><span class="ticker-badge">${r.ticker}</span></div></div>
        <div class="card-error">${r.error}</div>`;
      resultsEl.appendChild(card);
      return;
    }

    const rankCls = i < 3 ? `rank-${i+1}` : 'rank-n';
    card.innerHTML = `
      <div class="card-toggle" onclick="document.getElementById('${id}').classList.toggle('open')">
        <div class="card-top">
          <div class="card-left">
            <div class="rank-badge ${rankCls}">${i+1}</div>
            <span class="ticker-badge">${r.ticker}</span>
            <div>
              <div style="font-weight:500">${r.name} <span class="price">${r.currency} ${r.price.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</span></div>
              <div class="stock-meta">${r.sector} · ${r.industry}</div>
            </div>
          </div>
          <div class="card-right">
            <div class="overall-score ${ratingClass(r.rating)}">
              ${buildRing(r.overall_pct)}
              <span>${r.rating}</span>
            </div>
          </div>
        </div>
        <div class="expand-hint">click to expand details</div>
      </div>
      ${buildSignalBadges(r.scout_signals)}
      ${buildRedditBadge(r.reddit_signals)}
      ${buildPrediction(r.prediction)}
      <div class="breakdown-wrap" id="${id}">
        <div class="breakdown">
          ${buildSection('Fundamentals', r.fundamentals)}
          ${buildSection('Valuation', r.valuation)}
          ${buildSection('Dividends', r.dividends)}
          ${buildSection('Technicals', r.technicals)}
          ${r.sentiment ? buildSection('Sentiment & Signals', r.sentiment) : ''}
          ${r.fair_value ? buildSection('Fair Value', r.fair_value) : ''}
          ${r.risk_quality ? buildSection('Risk & Quality', r.risk_quality) : ''}
          ${r.growth_efficiency ? buildSection('Growth & Efficiency', r.growth_efficiency) : ''}
        </div>
      </div>
      <div class="card-actions">
        <button class="card-action-btn" onclick="event.stopPropagation();addToWatchlist('${r.ticker}',this)">+ Watchlist</button>
        <button class="card-action-btn" onclick="event.stopPropagation();runFindSimilar('${r.ticker}')">Find Similar</button>
        <button class="card-action-btn" onclick="event.stopPropagation();loadNews('${r.ticker}',this)">News</button>
        <button class="card-action-btn" onclick="event.stopPropagation();toggleMainChart('${r.ticker}',this)">Chart</button>
      </div>
      <div class="main-chart-section" id="mchart-${r.ticker}" style="display:none">
        <div class="mchart-toolbar">
          <button class="mchart-tf active" onclick="event.stopPropagation();switchMainTf('${r.ticker}','1mo','1d',this)">1M</button>
          <button class="mchart-tf" onclick="event.stopPropagation();switchMainTf('${r.ticker}','3mo','1d',this)">3M</button>
          <button class="mchart-tf" onclick="event.stopPropagation();switchMainTf('${r.ticker}','6mo','1d',this)">6M</button>
          <button class="mchart-tf" onclick="event.stopPropagation();switchMainTf('${r.ticker}','1y','1d',this)">1Y</button>
          <button class="mchart-tf" onclick="event.stopPropagation();switchMainTf('${r.ticker}','2y','1wk',this)">2Y</button>
          <button class="mchart-tf" onclick="event.stopPropagation();switchMainTf('${r.ticker}','5y','1wk',this)">5Y</button>
          <button class="mchart-type-btn" onclick="event.stopPropagation();toggleMainChartType('${r.ticker}',this)">Candles</button>
        </div>
        <div class="mchart-container" id="mchart-canvas-${r.ticker}"></div>
      </div>
      <div class="news-section" id="news-${r.ticker}" style="display:none"></div>`;
    resultsEl.appendChild(card);
  });
}

async function addToWatchlist(ticker, btn) {
  const resp = await fetch('/api/watchlist/add', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ticker }),
  });
  const data = await resp.json();
  btn.textContent = data.status === 'added' ? 'Added' : 'Already saved';
  btn.classList.add('added');
}

async function loadNews(ticker, btn) {
  const el = document.getElementById('news-' + ticker);
  if (el.style.display !== 'none') {
    el.style.display = 'none';
    btn.textContent = 'News';
    return;
  }
  btn.textContent = 'Loading...';
  try {
    const resp = await fetch('/api/news/' + ticker);
    const data = await resp.json();
    if (data.articles && data.articles.length > 0) {
      el.innerHTML = data.articles.map(a => {
        const ago = Math.round((Date.now()/1000 - a.datetime) / 3600);
        const timeStr = ago < 24 ? ago + 'h ago' : Math.round(ago/24) + 'd ago';
        return `<div class="news-item">
          <a href="${a.url}" target="_blank" class="news-headline">${a.headline}</a>
          <div class="news-meta">${a.source} · ${timeStr}</div>
        </div>`;
      }).join('');
    } else {
      el.innerHTML = '<span class="news-empty">No recent news found.</span>';
    }
    el.style.display = 'block';
    btn.textContent = 'Hide News';
  } catch (e) {
    el.innerHTML = '<span class="news-empty">Failed to load news.</span>';
    el.style.display = 'block';
    btn.textContent = 'News';
  }
}

async function toggleMainChart(ticker, btn) {
  const section = document.getElementById('mchart-' + ticker);
  if (section.style.display !== 'none') {
    section.style.display = 'none';
    btn.textContent = 'Chart';
    return;
  }
  section.style.display = 'block';
  btn.textContent = 'Hide Chart';
  if (!mainCharts[ticker]) {
    await renderMainChart(ticker, '1mo', '1d');
  }
}

async function renderMainChart(ticker, range, interval) {
  const container = document.getElementById('mchart-canvas-' + ticker);
  container.innerHTML = '<div class="mchart-loading"><span class="spinner"></span>Loading chart...</div>';

  try {
    const resp = await fetch(`/api/chart/${ticker}?range=${range}&interval=${interval}`);
    const json = await resp.json();
    if (!json.data || !json.data.length) {
      container.innerHTML = '<div class="mchart-loading">No chart data.</div>';
      return;
    }
    container.innerHTML = '';

    if (mainCharts[ticker] && mainCharts[ticker].chart) {
      mainCharts[ticker].chart.remove();
    }

    const chart = LightweightCharts.createChart(container, {
      width: container.clientWidth,
      height: 272,
      layout: {
        background: { type: 'solid', color: '#0a0c12' },
        textColor: '#9ca0b4',
        fontFamily: "'Segoe UI', -apple-system, sans-serif",
        fontSize: 11,
      },
      grid: {
        vertLines: { color: '#1a1d27' },
        horzLines: { color: '#1a1d27' },
      },
      crosshair: {
        mode: LightweightCharts.CrosshairMode.Normal,
        vertLine: { color: '#6c5ce7', width: 1, style: 2 },
        horzLine: { color: '#6c5ce7', width: 1, style: 2 },
      },
      rightPriceScale: { borderColor: '#2e3348', scaleMargins: { top: 0.1, bottom: 0.1 } },
      timeScale: {
        borderColor: '#2e3348',
        timeVisible: !['1d','1wk','1mo'].includes(interval),
      },
      handleScroll: true,
      handleScale: true,
    });

    const chartType = (mainCharts[ticker] && mainCharts[ticker].type) || 'area';
    let series;

    if (chartType === 'candle') {
      series = chart.addCandlestickSeries({
        upColor: '#00cec9', downColor: '#ff6b6b',
        borderUpColor: '#00cec9', borderDownColor: '#ff6b6b',
        wickUpColor: '#00cec9', wickDownColor: '#ff6b6b',
      });
      series.setData(json.data.filter(d => d.open && d.high && d.low && d.close));
    } else {
      series = chart.addAreaSeries({
        topColor: 'rgba(108, 92, 231, 0.4)',
        bottomColor: 'rgba(108, 92, 231, 0.0)',
        lineColor: '#a29bfe',
        lineWidth: 2,
      });
      series.setData(json.data.filter(d => d.close).map(d => ({ time: d.time, value: d.close })));
    }

    const volSeries = chart.addHistogramSeries({
      color: '#2e3348',
      priceFormat: { type: 'volume' },
      priceScaleId: '',
      scaleMargins: { top: 0.85, bottom: 0 },
    });
    volSeries.setData(json.data.filter(d => d.volume).map(d => ({
      time: d.time, value: d.volume,
      color: d.close >= d.open ? 'rgba(0,206,201,.3)' : 'rgba(255,107,107,.3)',
    })));

    chart.timeScale().fitContent();

    const ro = new ResizeObserver(() => { chart.applyOptions({ width: container.clientWidth }); });
    ro.observe(container);

    mainCharts[ticker] = { chart, series, volSeries, ro, type: chartType, range, interval };
  } catch (err) {
    container.innerHTML = '<div class="mchart-loading">Failed to load chart.</div>';
  }
}

function switchMainTf(ticker, range, interval, btn) {
  const toolbar = btn.parentElement;
  toolbar.querySelectorAll('.mchart-tf').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMainChart(ticker, range, interval);
}

function toggleMainChartType(ticker, btn) {
  const inst = mainCharts[ticker];
  const newType = (!inst || inst.type === 'area') ? 'candle' : 'area';
  if (inst) inst.type = newType;
  btn.textContent = newType === 'candle' ? 'Area' : 'Candles';
  const range = (inst && inst.range) || '1mo';
  const interval = (inst && inst.interval) || '1d';
  renderMainChart(ticker, range, interval);
}

function exportPDF() {
  if (!lastResults.length) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const W = doc.internal.pageSize.getWidth();
  const H = doc.internal.pageSize.getHeight();
  const M = 15;
  const usable = W - M * 2;
  let y = 20;

  const BLACK = [33, 33, 33];
  const GRAY = [120, 120, 130];
  const LGRAY = [200, 200, 205];
  const WHITE = [255, 255, 255];
  const PURPLE = [108, 92, 231];
  const GREEN = [16, 150, 72];
  const RED = [210, 50, 50];
  const AMBER = [180, 130, 0];
  const HEADBG = [245, 245, 250];
  const STRIPE = [250, 250, 253];
  const BARBG = [230, 230, 235];

  function checkPage(need) {
    if (y + need > H - 18) {
      doc.setFontSize(7);
      doc.setTextColor(...GRAY);
      doc.text('Pennies Stock Report', M, H - 8);
      doc.text('Page ' + doc.internal.pages.length, W - M, H - 8, { align: 'right' });
      doc.addPage();
      y = 18;
    }
  }

  function rColor(rating) {
    const r = rating.toLowerCase();
    if (r.includes('strong buy') || r.includes('buy')) return GREEN;
    if (r.includes('hold')) return AMBER;
    return RED;
  }

  function scoreColor(pct) {
    if (pct >= 70) return GREEN;
    if (pct >= 45) return AMBER;
    return RED;
  }

  // ==================== TITLE ====================
  doc.setFontSize(24);
  doc.setFont(undefined, 'bold');
  doc.setTextColor(...PURPLE);
  doc.text('Pennies', M, y);
  doc.setFontSize(14);
  doc.setTextColor(...BLACK);
  doc.text('Stock Report', M + 42, y);
  y += 8;
  doc.setFontSize(10);
  doc.setFont(undefined, 'normal');
  doc.setTextColor(...GRAY);
  doc.text(new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }), M, y);
  y += 4;
  doc.setDrawColor(...PURPLE);
  doc.setLineWidth(0.8);
  doc.line(M, y, W - M, y);
  y += 10;

  // ==================== SUMMARY TABLE ====================
  doc.setFontSize(14);
  doc.setFont(undefined, 'bold');
  doc.setTextColor(...BLACK);
  doc.text('Summary', M, y);
  y += 8;

  // Table header
  const colX = [M, M + 8, M + 24, M + 72, M + 100, M + 120, M + 148];
  doc.setFillColor(...HEADBG);
  doc.rect(M, y, usable, 9, 'F');
  doc.setFontSize(9);
  doc.setFont(undefined, 'bold');
  doc.setTextColor(...GRAY);
  ['#', 'Ticker', 'Company', 'Price', 'Score', 'Rating', '6M Outlook'].forEach((h, i) => {
    doc.text(h, colX[i], y + 6.5);
  });
  y += 10;

  // Table rows
  doc.setFont(undefined, 'normal');
  doc.setFontSize(9.5);
  lastResults.forEach((r, i) => {
    if (r.error) return;
    checkPage(9);
    if (i % 2 === 1) {
      doc.setFillColor(...STRIPE);
      doc.rect(M, y - 1, usable, 8, 'F');
    }
    doc.setTextColor(...GRAY);
    doc.text(String(i + 1), colX[0], y + 5);
    doc.setFont(undefined, 'bold');
    doc.setTextColor(...BLACK);
    doc.text(r.ticker, colX[1], y + 5);
    doc.setFont(undefined, 'normal');
    doc.setTextColor(...BLACK);
    doc.text(r.name.substring(0, 28), colX[2], y + 5);
    doc.text(r.currency + ' ' + r.price.toFixed(2), colX[3], y + 5);
    doc.setFont(undefined, 'bold');
    doc.setTextColor(...scoreColor(r.overall_pct));
    doc.text(r.overall_pct.toFixed(0) + '%', colX[4], y + 5);
    doc.setTextColor(...rColor(r.rating));
    doc.text(r.rating, colX[5], y + 5);
    doc.setFont(undefined, 'normal');
    if (r.prediction && r.prediction.combined_estimate) {
      const up = r.prediction.upside_pct;
      doc.setTextColor(...(up > 2 ? GREEN : up < -2 ? RED : AMBER));
      const sign = up > 0 ? '+' : '';
      doc.text('$' + r.prediction.combined_estimate.toFixed(2) + ' (' + sign + up.toFixed(1) + '%)', colX[6], y + 5);
    } else {
      doc.setTextColor(...GRAY);
      doc.text('N/A', colX[6], y + 5);
    }
    y += 8;
  });
  // Table bottom line
  doc.setDrawColor(...LGRAY);
  doc.setLineWidth(0.3);
  doc.line(M, y, W - M, y);
  y += 12;

  // ==================== DETAILED CARDS ====================
  doc.setFontSize(14);
  doc.setFont(undefined, 'bold');
  doc.setTextColor(...BLACK);
  checkPage(20);
  doc.text('Detailed Analysis', M, y);
  y += 10;

  lastResults.forEach((r, i) => {
    if (r.error) return;
    doc.addPage();
    y = 18;

    // ---- Card header ----
    doc.setFillColor(...PURPLE);
    doc.rect(M, y, usable, 12, 'F');
    doc.setFontSize(13);
    doc.setFont(undefined, 'bold');
    doc.setTextColor(...WHITE);
    doc.text((i + 1) + '.  ' + r.ticker + '  —  ' + r.name.substring(0, 30) + '    ' + r.currency + ' ' + r.price.toFixed(2), M + 4, y + 8.5);
    doc.setFontSize(12);
    doc.text(r.overall_pct.toFixed(0) + '%  ' + r.rating, W - M - 4, y + 8.5, { align: 'right' });
    y += 14;

    // ---- Sub-info ----
    doc.setFont(undefined, 'normal');
    doc.setFontSize(9);
    doc.setTextColor(...GRAY);
    doc.text(r.sector + '  |  ' + r.industry, M + 2, y + 1);
    y += 7;

    // ---- 6M Prediction ----
    if (r.prediction && r.prediction.combined_estimate) {
      const p = r.prediction;
      const up = p.upside_pct;
      doc.setFillColor(up > 2 ? 235 : up < -2 ? 255 : 255, up > 2 ? 250 : up < -2 ? 240 : 250, up > 2 ? 240 : up < -2 ? 240 : 235);
      doc.rect(M, y - 2, usable, 10, 'F');
      doc.setFontSize(9);
      doc.setFont(undefined, 'bold');
      doc.setTextColor(...(up > 2 ? GREEN : up < -2 ? RED : AMBER));
      const sign = up > 0 ? '+' : '';
      doc.text('6M Estimate: $' + p.combined_estimate.toFixed(2) + '  (' + sign + up.toFixed(1) + '%)', M + 4, y + 4.5);
      doc.setFont(undefined, 'normal');
      doc.setTextColor(...BLACK);
      let extra = '';
      if (p.analyst_target) extra += 'Analyst: $' + p.analyst_target.toFixed(2) + (p.analyst_count ? ' (' + p.analyst_count + ')' : '');
      if (p.trend_6m) extra += (extra ? '   |   ' : '') + 'Trend: $' + p.trend_6m.toFixed(2);
      if (p.analyst_low && p.analyst_high) extra += '   |   Range: $' + p.analyst_low.toFixed(2) + ' – $' + p.analyst_high.toFixed(2);
      if (extra) doc.text(extra, M + 68, y + 4.5);
      y += 12;
    }

    // ---- Score sections in a 2-column grid ----
    const sections = [
      { title: 'Fundamentals', data: r.fundamentals },
      { title: 'Valuation',    data: r.valuation },
      { title: 'Dividends',    data: r.dividends },
      { title: 'Technicals',   data: r.technicals },
    ];
    if (r.sentiment) sections.push({ title: 'Sentiment & Signals', data: r.sentiment });
    if (r.fair_value) sections.push({ title: 'Fair Value', data: r.fair_value });
    if (r.risk_quality) sections.push({ title: 'Risk & Quality', data: r.risk_quality });
    const colW = (usable - 6) / 2;
    const startY = y;
    let maxBottomY = y;

    sections.forEach((sec, si) => {
      const col = si % 2;
      const row = Math.floor(si / 2);
      if (col === 0 && row > 0) y = maxBottomY + 4;
      const sx = M + col * (colW + 6);
      let sy = col === 0 ? y : (row === 0 ? startY : maxBottomY + 4);

      // Section header
      doc.setFillColor(...HEADBG);
      doc.rect(sx, sy, colW, 7, 'F');
      doc.setFontSize(9);
      doc.setFont(undefined, 'bold');
      doc.setTextColor(...PURPLE);
      doc.text(sec.title, sx + 2, sy + 5);
      doc.setTextColor(...scoreColor(sec.data.pct));
      doc.text(sec.data.score + ' / ' + sec.data.max + '  (' + sec.data.pct.toFixed(0) + '%)', sx + colW - 2, sy + 5, { align: 'right' });

      // Score bar
      const barY = sy + 8.5;
      doc.setFillColor(...BARBG);
      doc.roundedRect(sx, barY, colW, 2.5, 1, 1, 'F');
      const bc = scoreColor(sec.data.pct);
      doc.setFillColor(...bc);
      doc.roundedRect(sx, barY, colW * sec.data.pct / 100, 2.5, 1, 1, 'F');

      // Detail rows
      let dy = barY + 6;
      doc.setFontSize(9);
      doc.setFont(undefined, 'normal');
      sec.data.details.forEach(d => {
        doc.setTextColor(...BLACK);
        doc.text(d.label, sx + 2, dy);
        doc.setTextColor(...GRAY);
        doc.text(d.value, sx + colW - 22, dy, { align: 'right' });
        doc.setFont(undefined, 'bold');
        doc.setTextColor(...scoreColor(d.pts / d.max * 100));
        doc.text(d.pts + '/' + d.max, sx + colW - 2, dy, { align: 'right' });
        doc.setFont(undefined, 'normal');
        dy += 6;
      });

      if (dy > maxBottomY) maxBottomY = dy;
    });

    y = maxBottomY + 4;
  });

  // ==================== FOOTER ====================
  const totalPages = doc.internal.pages.length - 1;
  for (let p = 1; p <= totalPages; p++) {
    doc.setPage(p);
    doc.setFontSize(7.5);
    doc.setTextColor(...GRAY);
    doc.text('Pennies Stock Report  —  Not financial advice', M, H - 8);
    doc.text('Page ' + p + ' of ' + totalPages, W - M, H - 8, { align: 'right' });
  }

  doc.save('pennies-report-' + new Date().toISOString().slice(0, 10) + '.pdf');
}
</script>
</body>
</html>
