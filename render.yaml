services:
  - type: web
    name: pennies
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --preload --log-level info
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: MONGODB_URI
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: FMP_API_KEY
        sync: false
